# fly.toml app configuration file generated for elliniafairywebsite on 2025-07-01T01:31:35+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'elliniafairywebsite'
primary_region = 'nrt' # Tokyo, Japan

[build]

[http_service]
  internal_port = 4321
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
